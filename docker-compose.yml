version: '3.8'

services:
  # ----------------------------------------
  # PostgreSQL (Audit Logs & Final Forms)
  # ----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: frontdesk-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin_password}
      POSTGRES_DB: ${POSTGRES_DB:-frontdesk}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-frontdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Redis (TTL & Caching)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: frontdesk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------
  # Elasticsearch (Knowledge Base)
  # ----------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: frontdesk-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # ----------------------------------------
  # Zookeeper (Required for Kafka)
  # ----------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: frontdesk-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ----------------------------------------
  # Kafka (Message Broker)
  # ----------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: frontdesk-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ----------------------------------------
  # Jaeger (Distributed Tracing)
  # ----------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: frontdesk-jaeger
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC 
      - "4318:4318"   # OTLP HTTP 

  # ----------------------------------------
  # Prometheus (Metrics)
  # ----------------------------------------
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: frontdesk-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  postgres_data:
  redis_data:
  es_data:
